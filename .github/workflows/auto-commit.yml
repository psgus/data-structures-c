name: Auto Commit
on:
  schedule:
    - cron: '0 14 * * *'  # 매일 오후 11시 KST (UTC+9 기준)
jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Commit if changes exist
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "auto: daily snapshot $(date +'%Y-%m-%d')"
      - name: Push
        run: git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
